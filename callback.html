<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Strava 연동 중 – STELVIO AI</title>
  <style>
    * { box-sizing: border-box; }
    html {
      font-size: 16px;
      -webkit-text-size-adjust: none;
      -moz-text-size-adjust: none;
      -ms-text-size-adjust: none;
      text-size-adjust: none;
    }
    body {
      font-size: 16px;
      -webkit-text-size-adjust: none;
      -moz-text-size-adjust: none;
      -ms-text-size-adjust: none;
      text-size-adjust: none;
      font-family: "Pretendard", "Noto Sans KR", sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f6f8fa;
      color: #222;
      padding: 24px;
    }
    .box {
      max-width: 400px;
      width: 100%;
      text-align: center;
      padding: 32px 24px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 6px 24px rgba(0,0,0,.08);
    }
    .spinner {
      width: 40px;
      height: 40px;
      margin: 0 auto 20px;
      border: 3px solid #eee;
      border-top-color: #fc4c02;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .msg { font-size: 1.05em; line-height: 1.5; color: #555; margin-bottom: 8px; }
    .err { color: #c00; }
    .link {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 24px;
      background: #fc4c02;
      color: #fff;
      text-decoration: none;
      border-radius: 10px;
      font-weight: 600;
      transition: opacity .2s;
    }
    .link:hover { opacity: .9; }
    .link:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="box">
    <div id="loading">
      <div class="spinner"></div>
      <p class="msg">Strava 연동을 처리하는 중입니다.</p>
    </div>
    <div id="success" class="hidden">
      <p class="msg">✅ Strava 연동이 완료되었습니다.</p>
      <div style="display: flex; flex-direction: column; gap: 12px; margin-top: 20px;">
        <button id="closeBtn" type="button" class="link" style="cursor: pointer; border: none; font-size: inherit; font-family: inherit; margin-top: 0;">닫기</button>
      </div>
    </div>
    <div id="error" class="hidden">
      <p class="msg err" id="errorText"></p>
      <a id="retryLink" class="link" href="./index.html">베이스캠프로 돌아가기</a>
    </div>
  </div>

  <!-- API 키·시크릿: config.local.js 에서 로드 (Git 제외) -->
  <script src="config.local.js"></script>
  <!-- GAS URL / Strava 콜백 URL (실제 값은 config.local.js) -->
  <script>
    window.CONFIG = window.CONFIG || {
      GAS_WEB_APP_URL: "https://example.com/exec",
      STRAVA_REDIRECT_URI: "https://example.com/callback.html"
    };
    window.GAS_URL = window.CONFIG.GAS_WEB_APP_URL;
    window.STRAVA_REDIRECT_URI = window.CONFIG.STRAVA_REDIRECT_URI;
  </script>
  <!-- Firebase 초기화 (stravaManager.js가 필요로 함) -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-functions.js"></script>
  <script>
    const firebaseConfig = window.__FIREBASE_CONFIG__ || {
      apiKey: "YOUR_FIREBASE_API_KEY",
      authDomain: "your-project.firebaseapp.com",
      projectId: "your-project",
      storageBucket: "your-project.firebasestorage.app",
      messagingSenderId: "000000000000",
      appId: "1:000000000000:web:xxxxxxxxxxxxxxxx"
    };
    
    // Firebase 초기화
    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    window.firestore = firebase.firestore();
    window.auth = firebase.auth();
    // Cloud Function 호출용 (stravaManager.js에서 exchangeStravaCode 시 서버 토큰 교환 사용)
    try {
      window.functionsV9 = firebase.app().functions();
      window.httpsCallableV9 = function (ref, name) { return ref.httpsCallable(name); };
    } catch (e) { console.warn('[callback.html] Functions 미설정:', e.message); }
    console.log('[callback.html] ✅ Firebase 초기화 완료 (Firestore + Auth + Functions)');
    
    // phoneToEmail 함수 정의 (index.html과 동일)
    function phoneToEmail(phoneNumber) {
      if (!phoneNumber) return null;
      const cleaned = phoneNumber.replace(/-/g, '');
      return cleaned + '@stelvio.ai';
    }
    window.phoneToEmail = phoneToEmail;
    
    // Firebase Auth 상태 복원 (localStorage에서)
    var authRestored = false;
    var authRestorePromise = null;
    
    // 인증 복원 함수
    async function restoreAuth() {
      if (authRestored) return true;
      
      const currentUser = firebase.auth().currentUser;
      if (currentUser) {
        console.log('[callback.html] ✅ Firebase Auth 로그인 상태 이미 있음:', currentUser.uid);
        window.currentUser = { id: currentUser.uid };
        authRestored = true;
        return true;
      }
      
      console.log('[callback.html] ⚠️ Firebase Auth 로그인 상태 없음 - localStorage에서 복원 시도');
      try {
        const currentUserStr = localStorage.getItem('currentUser');
        if (!currentUserStr) {
          console.warn('[callback.html] ⚠️ localStorage에 currentUser가 없습니다.');
          return false;
        }
        
        const currentUser = JSON.parse(currentUserStr);
        const userId = currentUser.id || currentUser.userId;
        console.log('[callback.html] 📋 localStorage에서 userId 추출:', userId);
        
        if (!userId) {
          console.warn('[callback.html] ⚠️ userId를 찾을 수 없습니다.');
          return false;
        }
        
        // 이메일과 비밀번호 찾기
        let email = null;
        let password = null;
        
        const phoneToEmailStr = localStorage.getItem('phoneToEmail');
        if (phoneToEmailStr) {
          try {
            const emailMap = JSON.parse(phoneToEmailStr);
            console.log('[callback.html] 📋 phoneToEmail 매핑:', Object.keys(emailMap).length, '개 항목');
            
            // userId를 포함하는 이메일 찾기
            const phone = Object.keys(emailMap).find(key => {
              const email = emailMap[key];
              return email && (email.includes(userId) || email === userId + '@stelvio.ai');
            });
            
            if (phone) {
              email = emailMap[phone] || phoneToEmail(phone);
              // 여러 형식의 키로 비밀번호 찾기 시도
              const phoneWithDash = phone; // 원본
              const phoneWithoutDash = phone.replace(/-/g, ''); // 하이픈 제거
              const phoneDigitsOnly = phone.replace(/\D/g, ''); // 숫자만
              
              password = localStorage.getItem('userPassword_' + phoneWithDash) ||
                         localStorage.getItem('userPassword_' + phoneWithoutDash) ||
                         localStorage.getItem('userPassword_' + phoneDigitsOnly) ||
                         localStorage.getItem('lastPassword');
              
              console.log('[callback.html] 📋 phoneToEmail에서 찾음:', { 
                phone: phone, 
                email: email, 
                hasPassword: !!password,
                triedKeys: [
                  'userPassword_' + phoneWithDash,
                  'userPassword_' + phoneWithoutDash,
                  'userPassword_' + phoneDigitsOnly,
                  'lastPassword'
                ]
              });
            }
          } catch (parseError) {
            console.warn('[callback.html] ⚠️ phoneToEmail 파싱 실패:', parseError);
          }
        }
        
        // Fallback: currentUser.contact에서 직접 변환
        if (!email && currentUser.contact) {
          email = phoneToEmail(currentUser.contact);
          // 여러 형식의 키로 비밀번호 찾기 시도
          const contactWithDash = currentUser.contact; // '010-4017-9020'
          const contactWithoutDash = currentUser.contact.replace(/-/g, ''); // '01040179020'
          const contactDigitsOnly = currentUser.contact.replace(/\D/g, ''); // 숫자만
          
          password = localStorage.getItem('userPassword_' + contactWithDash) ||
                     localStorage.getItem('userPassword_' + contactWithoutDash) ||
                     localStorage.getItem('userPassword_' + contactDigitsOnly) ||
                     localStorage.getItem('lastPassword');
          
          console.log('[callback.html] 📋 contact에서 직접 변환:', { 
            contact: currentUser.contact, 
            email: email, 
            hasPassword: !!password,
            triedKeys: [
              'userPassword_' + contactWithDash,
              'userPassword_' + contactWithoutDash,
              'userPassword_' + contactDigitsOnly,
              'lastPassword'
            ]
          });
        }
        
        if (!email) {
          console.warn('[callback.html] ⚠️ 이메일을 찾을 수 없습니다.');
          console.log('[callback.html] 디버깅 정보:', {
            hasEmail: !!email,
            currentUser: currentUser
          });
          return false;
        }
        
        // 비밀번호를 찾지 못한 경우, 모든 가능한 키를 시도
        if (!password) {
          console.log('[callback.html] 🔍 비밀번호를 찾기 위해 모든 localStorage 키 확인 중...');
          const allKeys = Object.keys(localStorage);
          const passwordKeys = allKeys.filter(key => 
            key.startsWith('userPassword_') || key === 'lastPassword'
          );
          console.log('[callback.html] 📋 발견된 비밀번호 키:', passwordKeys);
          
          // 각 키에서 비밀번호 찾기 시도
          for (const key of passwordKeys) {
            const value = localStorage.getItem(key);
            if (value && value.length >= 6) { // 최소 비밀번호 길이
              password = value;
              console.log('[callback.html] ✅ 비밀번호 발견:', key);
              break;
            }
          }
        }
        
        if (!password) {
          console.warn('[callback.html] ⚠️ 비밀번호를 찾을 수 없습니다.');
          console.log('[callback.html] 디버깅 정보:', {
            hasEmail: !!email,
            hasPassword: false,
            currentUser: currentUser,
            localStorageKeys: Object.keys(localStorage).filter(k => k.includes('password') || k.includes('Password'))
          });
          return false;
        }
        
        // Firebase Auth 로그인 시도
        try {
          console.log('[callback.html] 🔐 Firebase Auth 로그인 시도:', email);
          const userCredential = await firebase.auth().signInWithEmailAndPassword(email, password);
          console.log('[callback.html] ✅ Firebase Auth 로그인 복원 성공:', userCredential.user.uid);
          window.currentUser = { id: userCredential.user.uid };
          authRestored = true;
          return true;
        } catch (signInError) {
          console.error('[callback.html] ❌ Firebase Auth 로그인 복원 실패:', signInError);
          console.error('[callback.html] 오류 코드:', signInError.code);
          console.error('[callback.html] 오류 메시지:', signInError.message);
          return false;
        }
      } catch (e) {
        console.error('[callback.html] ❌ localStorage에서 인증 정보 복원 실패:', e);
        return false;
      }
    }
    
    // onAuthStateChanged 리스너
    firebase.auth().onAuthStateChanged(async function(user) {
      if (user) {
        console.log('[callback.html] ✅ Firebase Auth 상태 변경: 로그인됨', user.uid);
        window.currentUser = { id: user.uid };
        authRestored = true;
        // 인증 복원 완료 후 Strava 콜백 처리
        if (typeof window.handleStravaCallbackAfterAuth === 'function') {
          window.handleStravaCallbackAfterAuth();
        }
      } else {
        console.log('[callback.html] ⚠️ Firebase Auth 상태 변경: 로그아웃됨');
        // 인증 복원 시도
        authRestorePromise = restoreAuth();
        const restored = await authRestorePromise;
        if (restored && typeof window.handleStravaCallbackAfterAuth === 'function') {
          window.handleStravaCallbackAfterAuth();
        } else if (!restored) {
          // 인증 복원 실패 시 2초 후에도 시도
          setTimeout(function() {
            if (!authRestored && typeof window.handleStravaCallbackAfterAuth === 'function') {
              console.warn('[callback.html] ⚠️ 인증 복원 실패했지만 Strava 콜백 처리 시도');
              window.handleStravaCallbackAfterAuth();
            }
          }, 2000);
        }
      }
    });
  </script>
  <script src="assets/js/stravaManager.js"></script>
  <script src="assets/js/strava_auth.js"></script>
  <script src="assets/js/userManager.js"></script>
  <script src="assets/js/trainingResultsManager.js"></script>
  <script>
    (function () {
      var loading = document.getElementById('loading');
      var success = document.getElementById('success');
      var error = document.getElementById('error');
      var errorText = document.getElementById('errorText');
      var closeBtn = document.getElementById('closeBtn');
      var retryLink = document.getElementById('retryLink');

      function showLoading() {
        loading.classList.remove('hidden');
        success.classList.add('hidden');
        error.classList.add('hidden');
      }
      function showSuccess() {
        loading.classList.add('hidden');
        success.classList.remove('hidden');
        error.classList.add('hidden');
      }
      function showError(msg) {
        loading.classList.add('hidden');
        success.classList.add('hidden');
        error.classList.remove('hidden');
        errorText.textContent = msg || '연동 처리 중 오류가 발생했습니다.';
      }

      // 닫기 버튼: 팝업이면 부모에 알리고 창 닫기, 아니면 index로 이동
      if (closeBtn) {
        closeBtn.onclick = function() {
          if (window.opener) {
            try {
              window.opener.postMessage({ type: 'strava_connected' }, '*');
            } catch (e) {}
            window.close();
          }
          if (!window.closed) {
            localStorage.setItem('stravaCallbackReturn', 'basecampScreen');
            window.location.href = './index.html';
          }
        };
      }
      var returnUrl = new URLSearchParams(window.location.search).get('return_to') || './index.html#basecampScreen';
      if (retryLink) {
        retryLink.href = returnUrl;
        retryLink.onclick = function(e) {
          e.preventDefault();
          localStorage.setItem('stravaCallbackReturn', 'basecampScreen');
          window.location.href = './index.html';
        };
      }

      if (typeof handleStravaCallback !== 'function') {
        showError('Strava 연동 스크립트를 불러올 수 없습니다.');
        return;
      }

      // Firebase Auth 상태 복원 후 Strava 콜백 처리
      var callbackProcessed = false;
      window.handleStravaCallbackAfterAuth = async function() {
        if (callbackProcessed) {
          console.log('[callback.html] ⚠️ Strava 콜백이 이미 처리되었습니다.');
          return;
        }
        
        // 인증 상태 확인 및 복원 대기
        let currentUser = firebase.auth().currentUser;
        if (!currentUser) {
          console.log('[callback.html] ⚠️ Firebase Auth 사용자가 없습니다. 인증 복원 대기...');
          
          // 인증 복원 대기 (최대 5초)
          const maxWaitTime = 5000;
          const checkInterval = 100;
          let waited = 0;
          
          while (!currentUser && waited < maxWaitTime) {
            // 진행 중인 인증 복원 대기
            if (authRestorePromise) {
              await authRestorePromise;
            } else {
              // 인증 복원 시도
              await restoreAuth();
            }
            
            // 인증 상태 재확인
            currentUser = firebase.auth().currentUser;
            if (currentUser) {
              console.log('[callback.html] ✅ 인증 복원 완료:', currentUser.uid);
              window.currentUser = { id: currentUser.uid };
              break;
            }
            
            // 대기
            await new Promise(resolve => setTimeout(resolve, checkInterval));
            waited += checkInterval;
          }
          
          if (!currentUser) {
            console.error('[callback.html] ❌ 인증 복원 실패 또는 시간 초과 - Strava 콜백 처리 불가');
            showError('인증 정보를 복원할 수 없습니다. 다시 로그인해주세요.');
            return;
          }
        }
        
        callbackProcessed = true;
        console.log('[callback.html] ✅ Firebase Auth 상태 확인 완료, Strava 콜백 처리 시작');
        console.log('[callback.html] 현재 사용자:', currentUser.uid);
        handleStravaCallback(
          function () { showSuccess(); },
          function (err) { showError(err); }
        );
      };
      
      // 초기 인증 상태 확인 및 복원 시도
      (async function() {
        const currentUser = firebase.auth().currentUser;
        if (currentUser) {
          console.log('[callback.html] ✅ 초기 Firebase Auth 상태: 로그인됨', currentUser.uid);
          window.currentUser = { id: currentUser.uid };
          authRestored = true;
          // 약간의 지연 후 콜백 처리 (다른 스크립트 로드 대기)
          setTimeout(function() {
            window.handleStravaCallbackAfterAuth();
          }, 500);
        } else {
          console.log('[callback.html] ⚠️ 초기 Firebase Auth 상태: 로그아웃됨 - 복원 시도');
          // 인증 복원 시도 (onAuthStateChanged가 트리거될 때까지 기다림)
          authRestorePromise = restoreAuth();
        }
      })();
    })();
  </script>
</body>
</html>
